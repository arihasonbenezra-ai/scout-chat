<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --navy:#1E3A6E;--navy2:#1E3A6E;--navy-deep:#152E54;
  --teal:#3A6FD4;--teal2:#3A6FD4;--teal-light:#EBF2FD;--teal-mid:#7EB3F5;
  --accent-soft:#7EB3F5;
  --bg:#EEF1EE;--card:#FFFCFA;--border:#E2E8E4;--border2:#D0D8D4;
  --text:#3D4042;--muted:#6B7280;--dim:#9CA3AF;
  --green:#4ade80;
}
html{font-family:var(--font-sans)}
button,input,textarea,select{font-family:inherit}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse 147% 94.5% at 50% -20%, rgba(58,111,212,.147) 0%, transparent 55%),
    radial-gradient(ellipse 84% 52.5% at 100% 50%, rgba(30,58,110,.074) 0%, transparent 50%),
    radial-gradient(ellipse 73.5% 47.25% at 0% 80%, rgba(30,58,110,.053) 0%, transparent 45%),
    linear-gradient(175deg, #e6eae7 0%, var(--bg) 35%, #e7e9e6 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--font-sans);padding:24px 20px;
}
.card{
  font-family:var(--font-sans);
  width:100%;max-width:540px;height:680px;
  background:var(--card);
  border-radius:26px;overflow:hidden;
  border:1px solid rgba(255,255,255,.85);
  box-shadow:
    0 1px 1px rgba(30,58,110,.04),
    0 8px 28px rgba(30,58,110,.09),
    0 28px 56px rgba(0,0,0,.12),
    0 64px 100px rgba(30,58,110,.06),
    inset 0 1px 0 rgba(255,255,255,.95);
  display:flex;flex-direction:column;
}

/* ── HEADER ── */
.header{
  background:#1E3A6E;
  padding:18px 20px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(30,58,110,.35),inset 0 1px 0 rgba(255,255,255,.08);
}
.header-brand{display:flex;align-items:center;gap:10px}
.htitle{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hsub{font-size:11px;color:var(--accent-soft);margin-top:2px;opacity:.95;font-weight:500;letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:8px}
.online-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px}
.dgreen{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.5}}
.online-label{font-size:11px;font-weight:600;color:#fff}
.mode-pill{display:none;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;animation:fadeIn .3s ease}
.mode-pill.faq{background:rgba(58,111,212,.22);color:var(--teal)}
.mode-pill.trainer{background:rgba(255,255,255,.15);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;padding:22px 20px 16px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;
  background:linear-gradient(180deg,rgba(255,252,250,.95) 0%,rgba(245,248,246,.65) 100%);
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(30,58,110,.15);border-radius:2px}
.msg-row{display:flex;animation:fadeUp .25s ease forwards}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start;align-items:flex-start;gap:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,#243A6E,var(--navy-deep));flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(30,58,110,.25);border:1px solid rgba(255,255,255,.12);margin-top:14px}
.bubble{
  max-width:min(88%,28rem);padding:17px 22px;font-size:14px;line-height:1.68;letter-spacing:.01em;
  white-space:pre-wrap;overflow-wrap:break-word;word-wrap:break-word;
}
.bubble.bot{
  background:linear-gradient(180deg,#f6f9fd 0%,var(--teal-light) 100%);color:var(--text);
  border-radius:22px 22px 22px 8px;
  border:1px solid rgba(126,179,245,.38);
  box-shadow:0 3px 12px rgba(58,111,212,.12),0 12px 28px rgba(30,58,110,.05);
}
.bubble.bot strong{font-weight:600;color:#152E54}
.bubble.user strong{font-weight:600}
.bubble.user{
  background:linear-gradient(145deg,#243A6E 0%,var(--navy) 55%,var(--navy-deep) 100%);
  color:#fff;border-radius:22px 22px 8px 22px;
  box-shadow:0 2px 10px rgba(30,58,110,.2),0 10px 28px rgba(30,58,110,.18);
}
.typing-row{display:flex;align-items:center;gap:12px;animation:fadeUp .25s ease forwards}
.typing-row .avatar{margin-top:0}
.typing-dots{display:flex;align-items:center;gap:4px;padding:15px 20px;background:linear-gradient(180deg,#f6f9fd 0%,var(--teal-light) 100%);border:1px solid rgba(126,179,245,.38);border-radius:22px 22px 22px 8px;box-shadow:0 3px 12px rgba(58,111,212,.1)}
.typing-dots span{width:6px;height:6px;background:var(--accent-soft);border-radius:50%;animation:tp 1.2s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── QUICK REPLIES ── */
.quick-wrap{padding:4px 18px 10px;display:flex;flex-wrap:wrap;gap:8px}
.qr{padding:7px 14px;background:rgba(255,255,255,.7);border:1px solid rgba(30,58,110,.14);border-radius:999px;color:var(--muted);font-size:12px;cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s,transform .15s;box-shadow:0 1px 3px rgba(30,58,110,.06)}
.qr:hover{background:var(--teal);color:#fff;border-color:var(--teal2);box-shadow:0 4px 14px rgba(58,111,212,.3);transform:translateY(-1px)}

/* ── ROLE PICKER ── */
.role-picker-wrap{padding:4px 0 4px 36px}
.role-picker{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:18px;padding:14px;max-width:88%;box-shadow:0 4px 20px rgba(30,58,110,.06)}
.role-picker-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.role-btn{padding:8px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;text-align:left}
.role-btn:hover{border-color:var(--teal);background:var(--teal-light);color:var(--navy)}
.other-row{display:flex;gap:6px;margin-top:2px}
.other-input{flex:1;padding:7px 11px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);outline:none;transition:border-color .15s}
.other-input:focus{border-color:var(--teal)}
.other-input::placeholder{color:var(--dim)}
.other-go{padding:7px 13px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.other-go:hover{background:var(--navy2)}

/* ── MODE PICKER ── */
.mode-picker-wrap{padding:4px 0 4px 36px}
.mode-picker{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:18px;padding:14px;max-width:88%;box-shadow:0 4px 20px rgba(30,58,110,.06)}
.mode-picker-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.mode-list{display:flex;flex-direction:column;gap:6px}
.mode-btn{padding:10px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;text-align:left;transition:all .15s}
.mode-btn:hover{border-color:var(--teal);background:var(--teal-light)}
.mode-btn-title{font-size:12px;font-weight:600;color:var(--text)}
.mode-btn-sub{font-size:11px;color:var(--muted);margin-top:2px}
.mode-btn:hover .mode-btn-title{color:var(--navy)}

/* ── INPUT ── */
.input-area{padding:14px 18px 18px;border-top:1px solid rgba(226,232,228,.9);display:flex;gap:12px;background:linear-gradient(180deg,rgba(255,252,250,.98) 0%,var(--card) 100%);flex-shrink:0;box-shadow:0 -12px 28px rgba(30,58,110,.04)}
.input-area textarea{flex:1;padding:13px 18px;background:rgba(235,242,253,.95);border:1px solid rgba(58,111,212,.28);border-radius:16px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;resize:none;height:48px;line-height:1.5;overflow:hidden;box-shadow:inset 0 1px 2px rgba(255,255,255,.85)}
.input-area textarea:focus{border-color:var(--teal);box-shadow:inset 0 1px 2px rgba(255,255,255,.8),0 0 0 3px rgba(58,111,212,.18)}
.input-area textarea::placeholder{color:var(--dim)}
.send-btn{width:48px;height:48px;background:linear-gradient(165deg,#7EB3F5 0%,var(--teal) 50%,#2E62C4 100%);border:none;border-radius:16px;color:var(--navy);font-size:17px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s,filter .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(58,111,212,.3),0 6px 16px rgba(30,58,110,.1)}
.send-btn:hover{filter:brightness(1.03);box-shadow:0 4px 12px rgba(58,111,212,.35),0 10px 24px rgba(30,58,110,.12);transform:translateY(-1px)}
.send-btn:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-brand">
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M4 4h12a1 1 0 011 1v7a1 1 0 01-1 1H7l-4 3V5a1 1 0 011-1z" stroke="#7EB3F5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div><div class="htitle">Scout.</div><div class="hsub">Your AI Interview Coach</div></div>
    </div>
    <div class="header-right">
      <div class="mode-pill" id="mode-pill"></div>
      <div class="online-pill"><div class="dgreen"></div><span class="online-label">Online</span></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="user-input" placeholder="Type a message..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}"
      oninput="this.style.height='48px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button class="send-btn" id="send-btn" onclick="handleSend()">↑</button>
  </div>
</div>

<script>
// !! Replace this with your deployed Vercel URL !!
var PROXY_URL = 'https://scout-chat.vercel.app/api/chat';

var MODE = null;
var ROLE = null;
var TRAINER_MODE = null;
var convoHistory = [];
var msgEl = document.getElementById('messages');
var inputEl = document.getElementById('user-input');
var sendBtn = document.getElementById('send-btn');
var modePill = document.getElementById('mode-pill');
var AVATAR_SVG = '<svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M4 4h12a1 1 0 011 1v7a1 1 0 01-1 1H7l-4 3V5a1 1 0 011-1z" stroke="#7EB3F5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function scroll(){msgEl.scrollTop=msgEl.scrollHeight;}
function avatarEl(){var a=document.createElement('div');a.className='avatar';a.innerHTML=AVATAR_SVG;return a;}

function setBubbleText(el,text){
  el.textContent='';
  var re=/\*\*([^*]+)\*\*/g,last=0,m;
  while((m=re.exec(text))!==null){
    el.appendChild(document.createTextNode(text.slice(last,m.index)));
    var s=document.createElement('strong');s.textContent=m[1];el.appendChild(s);
    last=re.lastIndex;
  }
  el.appendChild(document.createTextNode(text.slice(last)));
}

function addMsg(role,text){
  var row=document.createElement('div');row.className='msg-row '+role;
  if(role==='bot')row.appendChild(avatarEl());
  var b=document.createElement('div');b.className='bubble '+role;
  setBubbleText(b,text);
  row.appendChild(b);msgEl.appendChild(row);scroll();
}

function showTyping(){
  var row=document.createElement('div');row.className='typing-row';row.id='typing';
  row.appendChild(avatarEl());
  var d=document.createElement('div');d.className='typing-dots';
  d.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(d);msgEl.appendChild(row);scroll();
}
function hideTyping(){var e=document.getElementById('typing');if(e)e.remove();}

function setModePill(mode){
  var labels={practice:'🎯 Practice Q&A',star:'⭐ STAR Coaching',mock:'🎬 Mock Interview'};
  modePill.textContent=labels[mode]||'';
  modePill.style.display='flex';
  modePill.className='mode-pill '+(mode==='faq'?'faq':'trainer');
}

function showQuickReplies(options){
  var wrap=document.createElement('div');wrap.className='quick-wrap';wrap.id='quick-replies';
  options.forEach(function(o){
    var b=document.createElement('button');b.className='qr';b.textContent=o;
    b.onclick=function(){removeQuickReplies();handleSendText(o);};
    wrap.appendChild(b);
  });
  msgEl.appendChild(wrap);scroll();
}
function removeQuickReplies(){var e=document.getElementById('quick-replies');if(e)e.remove();}

function showRolePicker(){
  var wrap=document.createElement('div');wrap.className='role-picker-wrap';wrap.id='role-picker';
  var card=document.createElement('div');card.className='role-picker';
  var lbl=document.createElement('div');lbl.className='role-picker-label';lbl.textContent='Select your role';
  card.appendChild(lbl);
  var grid=document.createElement('div');grid.className='role-grid';
  ['💻 Software Engineer','📦 Product Manager','📊 Data Analyst','🤝 Recruiter / HR','🎨 Designer','📣 Marketing'].forEach(function(r){
    var b=document.createElement('button');b.className='role-btn';b.textContent=r;
    b.onclick=function(){removeRolePicker();pickRole(r.replace(/^..\s/,''));};
    grid.appendChild(b);
  });
  card.appendChild(grid);
  var otherRow=document.createElement('div');otherRow.className='other-row';
  var inp=document.createElement('input');inp.className='other-input';inp.placeholder='Other — type your role...';
  var go=document.createElement('button');go.className='other-go';go.textContent='Go';
  go.onclick=function(){if(inp.value.trim()){removeRolePicker();pickRole(inp.value.trim());}};
  inp.onkeydown=function(e){if(e.key==='Enter'&&inp.value.trim()){removeRolePicker();pickRole(inp.value.trim());}};
  otherRow.appendChild(inp);otherRow.appendChild(go);card.appendChild(otherRow);
  wrap.appendChild(card);msgEl.appendChild(wrap);scroll();
}
function removeRolePicker(){var e=document.getElementById('role-picker');if(e)e.remove();}

function pickRole(role){
  ROLE=role;
  addMsg('user',role);
  addMsg('bot','Got it — '+role+'. Now pick a mode:');
  showModePicker();
}

function showModePicker(){
  var wrap=document.createElement('div');wrap.className='mode-picker-wrap';wrap.id='mode-picker';
  var card=document.createElement('div');card.className='mode-picker';
  var lbl=document.createElement('div');lbl.className='mode-picker-label';lbl.textContent='Choose a mode';
  card.appendChild(lbl);
  var list=document.createElement('div');list.className='mode-list';
  [{id:'practice',title:'🎯 Practice Q&A',sub:'Answer questions and get AI feedback on each response'},
   {id:'star',title:'⭐ STAR Coaching',sub:'Structure answers using Situation, Task, Action, Result'},
   {id:'mock',title:'🎬 Mock Interview',sub:'Full simulation with a debrief at the end'}
  ].forEach(function(m){
    var b=document.createElement('button');b.className='mode-btn';
    b.innerHTML='<div class="mode-btn-title">'+m.title+'</div><div class="mode-btn-sub">'+m.sub+'</div>';
    b.onclick=function(){removeModePicker();pickMode(m.id,m.title);};
    list.appendChild(b);
  });
  card.appendChild(list);wrap.appendChild(card);msgEl.appendChild(wrap);scroll();
}
function removeModePicker(){var e=document.getElementById('mode-picker');if(e)e.remove();}

function pickMode(modeId,modeTitle){
  TRAINER_MODE=modeId;MODE='trainer';
  addMsg('user',modeTitle);
  setModePill(modeId);
  history=[];
  showTyping();
  streamBotReply(getSystemPrompt(),[{role:'user',content:'Start the session now.'}],function(reply){
    convoHistory.push({role:'assistant',content:reply});
  });
}

function getSystemPrompt(){
  if(TRAINER_MODE==='practice') return 'You are an expert interview coach. The candidate is practicing for a '+ROLE+' role. Ask ONE interview question at a time. After they respond, give structured feedback: 1-2 strengths, 1-2 areas to improve (specific and actionable), then move to the next question. Keep each feedback response under 120 words. After 5 questions, give a brief overall summary with a readiness rating out of 10.';
  if(TRAINER_MODE==='star') return 'You are an interview coach specializing in the STAR method (Situation, Task, Action, Result) for a '+ROLE+' role. Ask one behavioral question at a time. After each answer, identify which STAR elements were present and missing, then show a concise example of how to strengthen it. Keep responses under 150 words. Then ask the next question.';
  if(TRAINER_MODE==='mock') return 'You are conducting a realistic mock interview for a '+ROLE+' position. Introduce yourself briefly and set the scene — in plain text only, no stage directions, no asterisks, no descriptions of body language or facial expressions. Ask questions one at a time, follow up naturally. Stay in character throughout. After 6-7 questions, end professionally and give a detailed debrief: overall impression, top 2 strengths, top 2 areas to improve, and a readiness rating out of 10.';
}

var FAQ_SYSTEM = 'You are Scout, a friendly and concise hiring assistant chatbot. Answer candidate questions about a company\'s interview process, benefits, culture, and hiring. Keep answers warm, helpful, and under 80 words. If you don\'t know something specific, advise them to ask their recruiter directly.';
var INTENT_SYSTEM = 'You are a routing assistant. Given a candidate\'s first message, determine if they want: (A) information about the company, job, benefits, or hiring process, or (B) interview preparation, coaching, or practice. Reply with ONLY the word "faq" or "trainer". Nothing else.';

function handleSend(){handleSendText(inputEl.value);}

function handleSendText(text){
  text=text.trim();if(!text)return;
  inputEl.value='';inputEl.style.height='48px';
  removeQuickReplies();

  if(MODE===null){
    addMsg('user',text);
    sendBtn.disabled=true;
    showTyping();
    callClaude(INTENT_SYSTEM,[{role:'user',content:text}],function(intent){
      hideTyping();
      sendBtn.disabled=false;
      intent=intent.trim().toLowerCase();
      if(intent==='trainer'){
        MODE='routing-trainer';
        addMsg('bot','Love it — let\'s get you ready. What role are you interviewing for?');
        showRolePicker();
      } else {
        MODE='faq';
        setModePill('faq');
        history=[];
        showTyping();
        convoHistory.push({role:'user',content:text});
        streamBotReply(FAQ_SYSTEM,convoHistory.slice(),function(reply){
          convoHistory.push({role:'assistant',content:reply});
        });
      }
    });
  } else if(MODE==='faq'){
    addMsg('user',text);
    convoHistory.push({role:'user',content:text});
    sendBtn.disabled=true;
    showTyping();
    callClaude(FAQ_SYSTEM,convoHistory,function(reply){
      hideTyping();sendBtn.disabled=false;
      convoHistory.push({role:'assistant',content:reply});
      addMsg('bot',reply);
    });
  } else if(MODE==='trainer'){
    addMsg('user',text);
    convoHistory.push({role:'user',content:text});
    sendBtn.disabled=true;
    showTyping();
    streamBotReply(getSystemPrompt(),convoHistory.slice(),function(reply){
      convoHistory.push({role:'assistant',content:reply});
    });
  }
}

async function callClaude(system,messages,cb){
  try{
    var res=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,system:system,messages:messages})
    });
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'Sorry, something went wrong.';
    cb(text);
  }catch(e){
    hideTyping();
    addMsg('bot','Something went wrong. Please try again.');
    sendBtn.disabled=false;
  }
}

function streamBotReply(system,messages,afterDone){
  var bubbleEl=null;
  var rowEl=null;
  callClaudeStream(system,messages,function(deltaText,fullText){
    if(!bubbleEl){
      hideTyping();
      rowEl=document.createElement('div');rowEl.className='msg-row bot';
      rowEl.appendChild(avatarEl());
      bubbleEl=document.createElement('div');bubbleEl.className='bubble bot';
      rowEl.appendChild(bubbleEl);
      msgEl.appendChild(rowEl);
    }
    setBubbleText(bubbleEl,fullText);
    scroll();
  },function(fullText){
    if(afterDone)afterDone(fullText);
    sendBtn.disabled=false;
  });
}

async function callClaudeStream(system,messages,onChunk,onDone){
  try{
    var res=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,stream:true,system:system,messages:messages})
    });
    if(!res.ok||!res.body){throw new Error('Stream failed: '+res.status);}
    var reader=res.body.getReader();
    var decoder=new TextDecoder();
    var buffer='';
    var fullText='';
    while(true){
      var chunk=await reader.read();
      if(chunk.done)break;
      buffer+=decoder.decode(chunk.value,{stream:true});
      var lines=buffer.split('\n');
      buffer=lines.pop();
      for(var i=0;i<lines.length;i++){
        var line=lines[i].trim();
        if(!line||!line.startsWith('data:'))continue;
        var payload=line.slice(5).trim();
        if(!payload)continue;
        try{
          var evt=JSON.parse(payload);
          if(evt.type==='content_block_delta'&&evt.delta&&evt.delta.type==='text_delta'){
            fullText+=evt.delta.text;
            onChunk(evt.delta.text,fullText);
          }
        }catch(e){}
      }
    }
    if(onDone)onDone(fullText);
  }catch(e){
    hideTyping();
    addMsg('bot','Something went wrong. Please try again.');
    sendBtn.disabled=false;
  }
}

MODE='routing-trainer';
